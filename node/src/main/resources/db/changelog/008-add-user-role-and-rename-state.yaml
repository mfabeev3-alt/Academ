databaseChangeLog:
  - changeSet:
      id: add-user-role-and-rename-state
      author: shatskikh
      changes:
        - addColumn:
            tableName: app_user
            columns:
              - column:
                  name: user_role
                  type: varchar(50)
              - column:
                  name: user_state
                  type: varchar(50)
                  constraints:
                    nullable: false