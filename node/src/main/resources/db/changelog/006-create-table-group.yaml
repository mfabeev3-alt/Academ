databaseChangeLog:
  - changeSet:
      id: create-table-group
      author: shatskikh
      changes:
        - createTable:
            tableName: "group"
            columns:
              - column:
                  name: id
                  type: bigserial
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: name
                  type: varchar(255)