databaseChangeLog:

  - changeSet:
      id: create-professor-table
      author: shatskikh
      changes:
        - createTable:
            tableName: professor
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_professor

              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false

              - column:
                  name: contact_info
                  type: varchar(255)

              - column:
                  name: group_id
                  type: bigint
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: professor
            baseColumnNames: group_id
            referencedTableName: app_group
            referencedColumnNames: id
            constraintName: fk_professor_group_id


  - changeSet:
      id: create-subject-table
      author: shatskikh
      changes:
        - createTable:
            tableName: subject
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_subject

              - column:
                  name: subject
                  type: varchar(255)
                  constraints:
                    nullable: false

              - column:
                  name: group_id
                  type: bigint
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: subject
            baseColumnNames: group_id
            referencedTableName: app_group
            referencedColumnNames: id
            constraintName: fk_subject_group_id