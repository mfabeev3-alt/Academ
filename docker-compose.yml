version: "3.8"
services:

  db:
    image: postgres:16
    container_name: academ-db
    environment:
      POSTGRES_DB: AcademBot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
          - ./postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - bot-network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./rabbitmq_data:/var/lib/rabbitmq
    networks:
      - bot-network

  minio:
    image: minio/minio
    container_name: bot_storage
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: 1234567890

    volumes:
      - ./data:/data
    networks:
      - bot-network
    command: ["server", "/data", "--console-address", ":9001"]
    restart: unless-stopped

networks:
  bot-network:
    driver: bridge